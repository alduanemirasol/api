<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    .endpoint { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 10px 0; }
    code { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Express API</h1>
  <p>Welcome to the API!</p>
  <div class="endpoint">
    <strong>GET /health</strong> - Health check endpoint
  </div>
  <div class="endpoint">
    <strong>GET /api/data</strong> - Sample JSON data
  </div>
  <div class="endpoint">
    <strong>GET /api/status</strong> - API status info
  </div>
</body>
</html>
